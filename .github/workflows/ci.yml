name: Build and Push

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: dockrphage/devops-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=sha,prefix=commit-,format=short
          type=raw,value=latest
          type=raw,value=${{ github.ref_name }}
    
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
    
    - name: Update GitOps repo
      run: |
        # Clone the GitOps repo
        git clone https://github.com/dockrphage/devops-gitops.git
        cd devops-gitops
        
        # Show current structure for debugging
        echo "📁 Current GitOps repo structure:"
        ls -la
        find . -name "*.yaml" -type f | head -10
        
        # Update the image tag in the deployment (base directory)
        if [ -f "app/base/deployment.yaml" ]; then
          sed -i "s|image: dockrphage/devops-app:.*|image: dockrphage/devops-app:${{ github.sha }}|g" app/base/deployment.yaml
          echo "✅ Updated app/base/deployment.yaml"
        else
          echo "⚠️  app/base/deployment.yaml not found, creating it..."
          mkdir -p app/base
          cat << YAML > app/base/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-app
  template:
    metadata:
      labels:
        app: devops-app
    spec:
      containers:
      - name: app
        image: dockrphage/devops-app:${{ github.sha }}
        ports:
        - containerPort: 8080
        env:
        - name: APP_VERSION
          value: "v${{ github.run_number }}"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: devops-app-service
spec:
  selector:
    app: devops-app
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-app-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: devops-app.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: devops-app-service
            port:
              number: 80
YAML
          echo "✅ Created app/base/deployment.yaml"
        fi
        
        # Update the overlay
        if [ -f "app/overlays/dev/kustomization.yaml" ]; then
          sed -i "s|image: dockrphage/devops-app:.*|image: dockrphage/devops-app:${{ github.sha }}|g" app/overlays/dev/kustomization.yaml
          echo "✅ Updated app/overlays/dev/kustomization.yaml"
        else
          echo "⚠️  app/overlays/dev/kustomization.yaml not found, creating it..."
          mkdir -p app/overlays/dev
          cat << YAML > app/overlays/dev/kustomization.yaml
apiVersion: kustomize.toolkit.io/v1
kind: Kustomization
metadata:
  name: devops-app-dev
spec:
  path: app/base/
  patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: dockrphage/devops-app:${{ github.sha }}
    target:
      kind: Deployment
      name: devops-app
YAML
          echo "✅ Created app/overlays/dev/kustomization.yaml"
        fi
        
        # Update version in deployment.yaml if it exists
        if [ -f "app/base/deployment.yaml" ]; then
          sed -i "s|value: \"v.*\"|value: \"v${{ github.run_number }}\"|g" app/base/deployment.yaml
        fi
        
        # Commit and push
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add .
        git commit -m "Update image to commit ${{ github.sha }} [skip ci]" || echo "No changes to commit"
        git push || echo "Push failed or no changes"
        
        echo "✅ GitOps repo updated!"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
